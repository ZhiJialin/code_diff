<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitLab Diff Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Page -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <h1>GitLab Diff Viewer</h1>
      </div>
      <p class="login-desc">登录 GitLab 查看分支代码差异</p>

      <div class="login-tabs">
        <button class="tab-btn active" data-tab="password">账号密码</button>
        <button class="tab-btn" data-tab="token">Access Token</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>GitLab 地址</label>
          <input type="text" id="gitlabUrl" value="http://git.100credit.cn" placeholder="http://git.100credit.cn">
        </div>

        <div id="passwordFields">
          <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
          </div>
          <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
          </div>
        </div>

        <div id="tokenFields" style="display:none">
          <div class="form-group">
            <label>Personal Access Token</label>
            <input type="password" id="privateToken" placeholder="粘贴你的 Access Token">
          </div>
          <p class="form-hint">在 GitLab → Settings → Access Tokens 中创建</p>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainApp" class="main-app" style="display:none">
    <header class="top-bar">
      <div class="top-left">
        <h1 class="brand">GitLab Diff</h1>
        <div class="selector-group">
          <div class="selector" id="projectSelector">
            <label>项目</label>
            <div class="select-box" id="projectSelectBox">
              <input type="text" id="projectSearch" placeholder="搜索项目..." autocomplete="off">
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="dropdown" id="projectDropdown"></div>
          </div>
          <div class="selector" id="branchSelector">
            <label>目标分支</label>
            <div class="select-box" id="branchSelectBox">
              <input type="text" id="branchSearch" placeholder="选择目标分支..." autocomplete="off">
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="dropdown" id="branchDropdown"></div>
          </div>
          <div class="selector" id="baseBranchSelector">
            <label>基准分支</label>
            <div class="select-box" id="baseBranchSelectBox">
              <input type="text" id="baseBranchSearch" placeholder="默认分支" autocomplete="off">
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="dropdown" id="baseBranchDropdown"></div>
          </div>
          <button id="compareBtn" class="compare-btn" disabled>对比</button>
        </div>
      </div>
      <div class="top-right">
        <div class="user-info" id="userInfo"></div>
        <button class="logout-btn" id="logoutBtn" title="退出登录">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="diff">Diff 对比</button>
      <button class="mode-tab" data-mode="browse">代码浏览</button>
    </div>

    <main class="container" id="diffContainer">
      <aside class="file-list" id="fileList">
        <div class="file-list-header">变更文件</div>
        <div class="file-list-content" id="fileListContent">
          <div class="empty-state">选择项目和分支后点击"对比"</div>
        </div>
        <div class="file-stats" id="fileStats"></div>
      </aside>
      <section class="diff-view" id="diffView">
        <div class="diff-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <p>选择项目和分支查看代码差异</p>
        </div>
      </section>
    </main>

    <main class="container" id="browseContainer" style="display:none">
      <aside class="file-list" id="treePanel">
        <div class="file-list-header">文件目录</div>
        <div class="tree-breadcrumb" id="treeBreadcrumb"></div>
        <div class="file-list-content" id="treeContent">
          <div class="empty-state">选择项目和分支查看代码</div>
        </div>
      </aside>
      <section class="diff-view" id="codeView">
        <div class="diff-placeholder">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/>
          </svg>
          <p>点击左侧文件查看代码</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
